name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build all

      - name: Release
        run: |
          mkdir -p releases
          find dist -type f -name "*.plugin.js" -exec cp {} releases/ \;

      - name: Upload Release Artifacts
        run: |
          gh release create ${{ github.ref }} releases/*.plugin.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
